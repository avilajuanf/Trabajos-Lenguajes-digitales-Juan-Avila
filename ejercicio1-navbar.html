<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 - Navbar responsiva</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      margin: 0;
    }

    .menu {
      display: flex;
      gap: 1rem;
    }

    .menu a {
      color: #222;
      text-decoration: none;
    }

    .menu a:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .btn {
      padding: 0.7rem 1rem;
      border: 0;
      border-radius: 8px;
      background-color: #1d4ed8;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #1e40af;
    }

    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
      }

      .menu {
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <h1 class="logo">DevSchool</h1>

    <nav class="menu" aria-label="Navegación principal">
      <a href="#">Inicio</a>
      <a href="#">Cursos</a>
      <a href="#">Proyectos</a>
      <a href="#">Contacto</a>
    </nav>

    <button class="btn">Inscribirse</button>
  </header>

</body>
</html>
